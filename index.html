<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>都内デパート 催事カレンダー（食品・物産展）</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 0.8rem;
      color: #666;
    }
    .store-filter {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 3px 8px;
      border-radius: 20px;
      border: 2px solid transparent;
      user-select: none;
      transition: opacity 0.15s;
    }
    .store-filter input { display: none; }
    .store-filter.active { opacity: 1; }
    .store-filter.inactive { opacity: 0.35; }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    #updated {
      margin-left: auto;
      font-size: 0.72rem;
      color: #999;
    }

    main {
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    #calendar-wrap {
      position: relative;
    }
    #calendar {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 12px;
    }

    /* 左右ホバー矢印（PC専用） */
    .cal-nav {
      display: none;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 88px;
      background: rgba(255,255,255,0.92);
      border: 1px solid #bbb;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,.2);
      cursor: pointer;
      font-size: 2rem;
      font-weight: 300;
      color: #333;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 10;
    }
    .cal-nav-prev {
      left: -44px;
      transform: translateY(-50%) translateX(0);
    }
    .cal-nav-next {
      right: -44px;
      transform: translateY(-50%) translateX(0);
    }
    #calendar-wrap:hover .cal-nav { opacity: 1; }
    .cal-nav-prev:hover {
      opacity: 1;
      transform: translateY(-50%) translateX(8px);
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    .cal-nav-next:hover {
      opacity: 1;
      transform: translateY(-50%) translateX(-8px);
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    @media (min-width: 601px) {
      .cal-nav { display: flex; }
    }

    /* 曜日別の日付数字の色 */
    .fc-day-sat .fc-daygrid-day-number { color: #0288d1 !important; }
    .fc-day-sun .fc-daygrid-day-number { color: #d32f2f !important; }

    /* 過去部分のイベント帯 */
    .fc-event.event-past {
      opacity: 0.30 !important;
      filter: grayscale(65%) !important;
    }

    /* 今日の日付セルを濃く */
    .fc .fc-day-today {
      background: #ff8c00 !important;
    }

    /* 月境界線：各月1日セルの左辺ボーダーを太線に */
    .fc-day[data-date$="-01"] {
      border-left: 3px solid #000 !important;
    }

    /* スマホ縦スクロール: 月ラベル（fc-daygrid-day-top の flex 左端に配置） */
    .fc-month-start-label {
      font-size: 0.62rem;
      font-weight: 700;
      color: #ff69b4;
      line-height: 1;
      align-self: center;
      margin-left: 2px;
      pointer-events: none;
    }

    /* モーダル */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      position: relative;
    }
    #modal h2 { font-size: 1rem; margin-bottom: 12px; line-height: 1.5; }
    #modal table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    #modal td { padding: 5px 0; vertical-align: top; }
    #modal td:first-child { width: 80px; color: #666; font-size: 0.8rem; }
    #modal a { color: #1a73e8; text-decoration: none; }
    #modal a:hover { text-decoration: underline; }
    #modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none;
      font-size: 1.4rem; cursor: pointer; color: #888;
      line-height: 1;
    }
    #modal-close:hover { color: #333; }

    @media (max-width: 600px) {
      header { padding: 10px 12px; gap: 10px; }
      main { padding: 8px; }
      .fc-prev-button, .fc-next-button { display: none !important; }
      /* リスト表示スタイル調整 */
      .fc-list-event-title { font-size: 0.82rem; }
      .fc-list-day-text, .fc-list-day-side-text { font-size: 0.85rem; }
      .fc-list-event td { padding: 6px 8px; }
    }
  </style>
</head>
<body>

<header>
  <h1>都内デパート 催事カレンダー</h1>
  <div class="filters">
    <span class="filter-label">店舗：</span>
    <!-- js で生成 -->
  </div>
  <span id="updated"></span>
</header>

<main>
  <div id="calendar-wrap">
    <button class="cal-nav cal-nav-prev" id="cal-prev" aria-label="前の月">&#8249;</button>
    <div id="calendar"></div>
    <button class="cal-nav cal-nav-next" id="cal-next" aria-label="次の月">&#8250;</button>
  </div>
</main>

<!-- イベント詳細モーダル -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="閉じる">&times;</button>
    <h2 id="modal-title"></h2>
    <table>
      <tr><td>店舗</td><td id="modal-store"></td></tr>
      <tr><td>会期</td><td id="modal-period"></td></tr>
      <tr><td>フロア</td><td id="modal-floor"></td></tr>
      <tr><td>詳細</td><td><a id="modal-link" href="#" target="_blank" rel="noopener">公式ページを開く →</a></td></tr>
    </table>
  </div>
</div>

<script>
// 日本の祝日（2025〜2026年）
const JP_HOLIDAYS = new Set([
  // 2025
  "2025-01-01","2025-01-13","2025-02-11","2025-02-23","2025-02-24",
  "2025-03-20","2025-04-29","2025-05-03","2025-05-04","2025-05-05","2025-05-06",
  "2025-07-21","2025-08-11","2025-09-15","2025-09-23","2025-10-13",
  "2025-11-03","2025-11-23","2025-11-24",
  // 2026
  "2026-01-01","2026-01-12","2026-02-11","2026-02-23",
  "2026-03-20","2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06",
  "2026-07-20","2026-08-11","2026-09-21","2026-09-22","2026-09-23","2026-10-12",
  "2026-11-03","2026-11-23",
]);

const STORE_COLORS = {
  "東武池袋": "#1565C0",
  "京王新宿": "#00897B",
  "新宿高島屋": "#C62828",
  "新宿伊勢丹": "#6A1B9A",
  "日本橋三越": "#E65100",
};

const activeStores = new Set(Object.keys(STORE_COLORS));

let allEvents = [];
let calendarInstance = null;

async function loadEvents() {
  const res = await fetch("data/events.json?" + Date.now());
  allEvents = await res.json();

  // 更新日時を最新 scrape の start 日付から推定
  const updatedEl = document.getElementById("updated");
  updatedEl.textContent = "最終更新: " + new Date().toLocaleDateString("ja-JP");

  return allEvents;
}

function toFCEvents(events) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayStr = today.toISOString().split('T')[0];

  const result = [];
  events
    .filter(e => activeStores.has(e.store))
    .forEach(e => {
      const color = STORE_COLORS[e.store] || "#607D8B";
      const label = `[${e.store.replace(/池袋|新宿|日本橋/, "")}] ${e.title}`;
      const base = { title: label, allDay: true, color, extendedProps: e };

      const startDate = new Date(e.start);
      const endDate   = new Date(e.end);

      if (endDate <= today) {
        // 全期間が過去
        result.push({ ...base, id: e.id, start: e.start, end: e.end,
                      classNames: ['event-past'] });
      } else if (startDate < today) {
        // 開催中：過去部分（グレー）と残り部分（通常色）に分割
        result.push({ ...base, id: e.id + '-p', start: e.start, end: todayStr,
                      classNames: ['event-past'] });
        result.push({ ...base, id: e.id + '-f', start: todayStr, end: e.end });
      } else {
        // 全期間が未来
        result.push({ ...base, id: e.id, start: e.start, end: e.end });
      }
    });
  return result;
}

function buildFilters() {
  const container = document.querySelector(".filters");
  Object.entries(STORE_COLORS).forEach(([store, color]) => {
    const label = document.createElement("label");
    label.className = "store-filter active";
    label.innerHTML = `<input type="checkbox" checked /><span class="dot" style="background:${color}"></span>${store}`;
    label.addEventListener("click", (ev) => {
      ev.preventDefault();
      if (activeStores.has(store)) {
        activeStores.delete(store);
        label.className = "store-filter inactive";
      } else {
        activeStores.add(store);
        label.className = "store-filter active";
      }
      calendarInstance.removeAllEvents();
      calendarInstance.addEventSource(toFCEvents(allEvents));
    });
    container.appendChild(label);
  });
}

function showModal(event) {
  const p = event.extendedProps;
  document.getElementById("modal-title").textContent = p.title;
  document.getElementById("modal-store").textContent = p.store;

  const startDate = new Date(p.start);
  // end は exclusive なので -1日表示
  const endDate = new Date(p.end);
  endDate.setDate(endDate.getDate() - 1);
  const fmt = d => d.toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric"});
  document.getElementById("modal-period").textContent =
    p.start === p.end ? fmt(startDate) : `${fmt(startDate)} 〜 ${fmt(endDate)}`;

  document.getElementById("modal-floor").textContent = p.floor || "—";
  const link = document.getElementById("modal-link");
  link.href = p.url || "#";

  document.getElementById("modal-overlay").classList.add("open");
}

document.getElementById("modal-close").addEventListener("click", () => {
  document.getElementById("modal-overlay").classList.remove("open");
});
document.getElementById("modal-overlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove("open");
});

(async () => {
  buildFilters();
  await loadEvents();

  const isMobile = () => window.innerWidth <= 600;

  // 今週月曜日の行を画面最上部に表示（初期表示・リサイズ時）
  function scrollToThisWeek() {
    const today = new Date();
    const daysFromMon = (today.getDay() + 6) % 7; // 月曜起点での経過日数
    const mon = new Date(today);
    mon.setDate(today.getDate() - daysFromMon);
    const dateStr = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
    const weekEl = calEl.querySelector(`[data-date="${dateStr}"]`);
    const target = weekEl || calEl.querySelector('.fc-day-today');
    if (target) target.scrollIntoView({ behavior: 'instant', block: 'start' });
  }

  // 「今日」ボタン：今日のセルを画面上部へ
  function scrollToToday() {
    const todayEl = calEl.querySelector('.fc-day-today');
    if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  const calEl = document.getElementById("calendar");
  calendarInstance = new FullCalendar.Calendar(calEl, {
    firstDay: 1,
    initialView: isMobile() ? "dayGridScrollable" : "dayGridMonth",
    headerToolbar: isMobile()
      ? { left: "todayScroll", center: "title", right: "" }
      : { left: "today", center: "title", right: "" },
    customButtons: {
      todayScroll: {
        text: "今日",
        click: scrollToToday,
      },
    },
    locale: "ja",
    buttonText: { today: "今日" },
    views: {
      dayGridScrollable: {
        type: "dayGrid",
        duration: { months: 12 },
        titleFormat: () => "",
      },
    },
    titleFormat: (info) => `${info.date.marker.getUTCFullYear()}年${info.date.marker.getUTCMonth() + 1}月`,
    dayHeaderContent: (info) => ['日','月','火','水','木','金','土'][info.date.getUTCDay()],
    dayCellContent: (info) => ({ html: String(info.date.getDate()) }),
    events: toFCEvents(allEvents),
    dayCellDidMount(info) {
      const d = info.date;
      // 月ラベル：スマホ縦スクロール時、1日セルの左側に配置
      // .fc-daygrid-day-top は flex-direction:row-reverse のため
      // appendChild すると DOM 末尾 = 視覚的に左端になる
      if (isMobile() && d.getDate() === 1) {
        const top = info.el.querySelector('.fc-daygrid-day-top');
        if (top) {
          const label = document.createElement('span');
          label.className = 'fc-month-start-label';
          label.textContent = `${d.getMonth() + 1}月`;
          top.appendChild(label);
        }
      }
      // 祝日は赤色
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (JP_HOLIDAYS.has(dateStr)) {
        const numEl = info.el.querySelector('.fc-daygrid-day-number');
        if (numEl) numEl.style.setProperty('color', '#d32f2f', 'important');
      }
    },
    eventClick(info) {
      info.jsEvent.preventDefault();
      showModal(info.event);
    },
    height: "auto",
    dayMaxEvents: 5,
    eventDisplay: "block",
  });
  calendarInstance.render();

  // モバイル初期表示時は今週の行を先頭に
  if (isMobile()) {
    setTimeout(scrollToThisWeek, 200);
  }

  // サイド矢印ボタン（PC）
  document.getElementById("cal-prev").addEventListener("click", () => calendarInstance.prev());
  document.getElementById("cal-next").addEventListener("click", () => calendarInstance.next());

  // 画面幅変化でビューを切り替え（PC⇔スマホ回転など）
  let lastMobile = isMobile();
  window.addEventListener("resize", () => {
    const nowMobile = isMobile();
    if (nowMobile === lastMobile) return;
    lastMobile = nowMobile;
    if (nowMobile) {
      calendarInstance.changeView("dayGridScrollable");
      calendarInstance.setOption("headerToolbar",
        { left: "todayScroll", center: "title", right: "" });
      setTimeout(scrollToThisWeek, 200);
    } else {
      calendarInstance.changeView("dayGridMonth");
      calendarInstance.setOption("headerToolbar",
        { left: "today", center: "title", right: "" });
    }
  });

  // スワイプで月移動（PCグリッド表示時のみ）
  let touchStartX = 0;
  calEl.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  calEl.addEventListener("touchend", (e) => {
    if (isMobile()) return;
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      diff > 0 ? calendarInstance.next() : calendarInstance.prev();
    }
  }, { passive: true });
})();
</script>
</body>
</html>
